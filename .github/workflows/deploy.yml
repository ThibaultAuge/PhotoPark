name: Deploy PhotoPark

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag d'image personnalisé (optionnel)"
        required: false
        type: string

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy
        run: bash scripts/deploy.sh
        env:
          REGISTRY: ${{ vars.REGISTRY || 'registry.local:5000' }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.run_number }}
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
